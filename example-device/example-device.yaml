# TEMPLATE: This is an example device configuration. Replace this directory
# with one directory per real device, each containing:
#   <device>/<device>.yaml          - the core config users adopt via the dashboard
#   <device>/<device>.factory.yaml  - the factory wrapper built and shipped by CI
# Remember to update the `files:` list in .github/workflows/build.yml when
# adding or renaming devices.
esphome:
  name: example-device
  friendly_name: Example Device
  # Automatically add the mac address to the name
  # so you can use a single firmware for all devices
  name_add_mac_suffix: true

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# To be able to get logs from the device via serial and api.
logger:

# API is a requirement of the dashboard import.
api:
  id: api_id
  encryption:   # Uses key set by Home Assistant

ota:
  - platform: esphome
    id: ota_esphome

wifi:
  # Set up a wifi access point using the device name above
  ap:

# In combination with the `ap` this allows the user
# to provision wifi credentials to the device.
captive_portal:

network:
  enable_ipv6: true

button:
  - platform: factory_reset
    id: factory_reset_button
    name: "Factory Reset"
    entity_category: diagnostic
    disabled_by_default: true

  - platform: restart
    id: restart_button
    name: "Restart"
    entity_category: config
    disabled_by_default: true
    icon: "mdi:restart"
